services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iot
      POSTGRES_PASSWORD: iot
      POSTGRES_DB: iot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot -d iot"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      PORT: "4000"
      DATABASE_URL: postgres://iot:iot@postgres:5432/iot
      JWT_SECRET: change-me-change-me-change-me
      FRONTEND_ORIGIN: http://localhost:5173
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_SENSOR_TOPIC: sensor/data
      MQTT_LED1_TOPIC: led/n1
      MQTT_LED2_TOPIC: led/n2
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: sh -c "node dist/scripts/initDb.js && node dist/index.js"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_BACKEND_URL: http://localhost:4000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:
